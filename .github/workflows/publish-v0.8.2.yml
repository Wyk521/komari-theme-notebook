name: Publish v0.8.2

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/publish-v0.8.2.yml

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      TARGET_SHA: 1c3b360dd42da42379871b6522be6172667674f5
      RELEASE_TAG: v0.8.2
      RELEASE_ASSET: KomariNotebook-v0.8.2-install.zip
    steps:
      - name: Check out tested source
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_SHA }}

      - name: Build install package
        run: zip -qr "/tmp/$RELEASE_ASSET" komari-theme.json preview.png dist

      - name: Create release and upload install package
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "/tmp/$RELEASE_ASSET" --clobber
          else
            gh release create "$RELEASE_TAG" "/tmp/$RELEASE_ASSET" \
              --target "$TARGET_SHA" \
              --title "Komari Notebook v0.8.2" \
              --notes-file RELEASE_NOTES.md
          fi
