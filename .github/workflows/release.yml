name: Build and publish release

on:
  push:
    branches:
      - main
    paths:
      - package.json
  issues:
    types:
      - opened
      - edited
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    if: github.event_name != 'issues' || startsWith(github.event.issue.title, '[release]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check tested theme files
        run: npm run check

      - name: Package importable theme
        shell: bash
        run: |
          node scripts/package-release.mjs release/package
          cd release/package
          zip -r "../KomariNotebook-v${{ steps.version.outputs.version }}.zip" .
          cd ..
          sha256sum "KomariNotebook-v${{ steps.version.outputs.version }}.zip" > "KomariNotebook-v${{ steps.version.outputs.version }}.zip.sha256"
          unzip -Z1 "KomariNotebook-v${{ steps.version.outputs.version }}.zip" | grep -qx 'komari-theme.json'
          unzip -Z1 "KomariNotebook-v${{ steps.version.outputs.version }}.zip" | grep -qx 'preview.png'
          unzip -Z1 "KomariNotebook-v${{ steps.version.outputs.version }}.zip" | grep -qx 'dist/index.html'
          ! unzip -Z1 "KomariNotebook-v${{ steps.version.outputs.version }}.zip" | grep -Eqi 'preview|hotfix|test|092p'

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: main
          name: Komari Notebook v${{ steps.version.outputs.version }}
          body_path: RELEASE_NOTES.md
          make_latest: true
          overwrite_files: true
          files: |
            release/KomariNotebook-v${{ steps.version.outputs.version }}.zip
            release/KomariNotebook-v${{ steps.version.outputs.version }}.zip.sha256
