name: Cleanup temporary branches

on:
  pull_request:
    types: [reopened]

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete every branch except default branch
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const repository = await github.rest.repos.get({ owner, repo });
            const defaultBranch = repository.data.default_branch;
            const branches = await github.paginate(github.rest.repos.listBranches, {
              owner,
              repo,
              per_page: 100,
            });

            const deleted = [];
            for (const branch of branches) {
              if (branch.name === defaultBranch) continue;
              await github.rest.git.deleteRef({
                owner,
                repo,
                ref: `heads/${branch.name}`,
              });
              deleted.push(branch.name);
              core.info(`Deleted branch: ${branch.name}`);
            }

            core.info(`Default branch kept: ${defaultBranch}`);
            core.info(`Deleted ${deleted.length} branch(es): ${deleted.join(', ') || 'none'}`);
