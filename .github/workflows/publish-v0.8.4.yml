name: Publish v0.8.4

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/publish-v0.8.4.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, 'publish v0.8.4')
    runs-on: ubuntu-latest
    env:
      TARGET_SHA: 38b4de4d021235c2e732fe6bc78ec803c12d084a
      RELEASE_TAG: v0.8.4
      RELEASE_ASSET: KomariNotebook-v0.8.4-install.zip
    steps:
      - name: Check out tested source
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_SHA }}

      - name: Build install package
        run: zip -qr "/tmp/$RELEASE_ASSET" komari-theme.json preview.png dist

      - name: Create release and upload install package
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "/tmp/$RELEASE_ASSET" --clobber
          else
            gh release create "$RELEASE_TAG" "/tmp/$RELEASE_ASSET" \
              --target "$TARGET_SHA" \
              --title "Komari Notebook v0.8.4" \
              --notes-file RELEASE_NOTES.md
          fi
