name: Publish v0.8.1

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/publish-v0.8.1.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create release and upload install package
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="v0.8.1"
          asset="release/KomariNotebook-v0.8.1-install.zip"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "$asset" --clobber
          else
            gh release create "$tag" "$asset" \
              --target "$GITHUB_SHA" \
              --title "Komari Notebook v0.8.1" \
              --notes-file RELEASE_NOTES.md
          fi
